name: stale

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report what would happen without changing anything"
        type: boolean
        default: true

# Default-deny at the workflow level; the job opts into only what it needs.
permissions: {}

concurrency:
  group: stale
  cancel-in-progress: false

jobs:
  stale:
    name: Mark and close inactive issues and PRs
    # Scheduled runs stay dry until STALE_AUTOMATION_MODE=live; "off" pauses the
    # schedule. Manual dispatches ignore the variable.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.STALE_AUTOMATION_MODE != 'off'
    runs-on: ubuntu-latest
    permissions:
      issues: write  # label, comment on, and close inactive issues
      pull-requests: write  # same for PRs; labelling a PR still needs this scope
      actions: write  # actions/stale stores its progress cursor in the Actions cache
    steps:
      - name: Guard manual live run
        # Fail loudly on an un-ticked dry_run before the repo has opted in,
        # rather than silently downgrading it to a dry run.
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.dry_run == false
        env:
          STALE_MODE: ${{ vars.STALE_AUTOMATION_MODE }}
        run: |
          if [ "$STALE_MODE" != "live" ]; then
            echo "::error::Set STALE_AUTOMATION_MODE=live before requesting a live run."
            exit 1
          fi

      # PRs are selected only by these labels, which all mean the contributor
      # owes a response (a description fix, or a rebase). Clean review-ready PRs
      # carry none of them, so review latency on our side cannot close a PR.
      # Issues have no such signal, so they are selected by age.
      - name: Mark and close inactive items
        id: stale
        uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629  # v10.4.0
        with:
          any-of-pr-labels: needs work, merge conflict, stale pr
          exempt-pr-labels: blocked, help wanted, good first issue, security, pinned
          exempt-issue-labels: blocked, help wanted, good first issue, security, pinned
          days-before-pr-stale: 14
          days-before-pr-close: 14
          days-before-issue-stale: 45
          days-before-issue-close: 14
          stale-pr-label: inactive
          stale-issue-label: inactive
          close-issue-reason: not_planned
          ascending: true
          # A newly stale item costs 4 counted ops including 2 real reads that
          # run even in a dry run, so do not raise this: 800 keeps both modes
          # under the GITHUB_TOKEN 1000/hr limit. The backlog drains over a few
          # daily runs via the Actions-cache cursor.
          operations-per-run: 800
          debug-only: ${{ inputs.dry_run || vars.STALE_AUTOMATION_MODE != 'live' }}
          stale-pr-message: |
            No response for 14 days on a PR flagged as needing action from you
            (`needs work` for a description fix, or `merge conflict` / `stale pr`
            for a rebase), so it is now labelled `inactive`.

            Push or comment to keep it open. Either one clears the label and
            resets the clock; fixing the flagged item is what the labels are
            waiting on.

            Otherwise it closes in 14 days. Nothing is deleted, your branch is
            untouched, and you can reopen at any time.
          close-pr-message: |
            Closing after 28 days with no response on a PR that was waiting on a
            change from you: 14 days after the `inactive` label, which itself
            followed 14 quiet days on a flagged PR.

            This is not a verdict on the change. Push the fix and reopen this PR,
            or open a fresh one, whenever you are ready. Your branch is untouched.
          stale-issue-message: |
            No activity on this issue for 45 days, so it is now labelled
            `inactive`.

            If it is still happening, comment and say so. That clears the label
            and keeps it open. Noting which version or commit you are on is
            especially useful.

            Otherwise it closes in 14 days. Closed issues stay searchable and
            can be reopened, so if this resurfaces later that is easy to undo.
          close-issue-message: |
            Closing after 59 days with no activity. Closed as "not planned",
            which means nobody is currently working on it, not that the report
            was invalid.

            If you are still hitting this, comment and it can be reopened.
            Including your version or commit and the steps to reproduce will
            help.

      # Preview on a dry run, record of what changed on a live run.
      - name: Publish review queue
        if: always() && steps.stale.outcome == 'success'
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run || false }}
          # These outputs serialise the action's full option set, repo token
          # included. Never echo them raw; the jq below strips to safe fields.
          RAW_STALE: ${{ steps.stale.outputs['staled-issues-prs'] || '[]' }}
          RAW_CLOSE: ${{ steps.stale.outputs['closed-issues-prs'] || '[]' }}
        run: |
          SAFE_STALE=$(jq -c 'map({number, title, created_at, pull_request})' <<< "$RAW_STALE")
          SAFE_CLOSE=$(jq -c 'map({number, title, created_at, pull_request})' <<< "$RAW_CLOSE")

          render_items() {
            local heading="$1"
            local items="$2"

            if ! jq -e 'length > 0' >/dev/null 2>&1 <<< "$items"; then
              echo "### $heading"
              echo "_None._"
              echo
              return
            fi

            echo "### $heading ($(jq -r 'length' <<< "$items"))"
            echo

            # created_at, not updated_at: the action rewrites updated_at to the
            # run time when it marks an item, so it cannot show last activity.
            jq -r --arg repo "$GITHUB_REPOSITORY" '
              .[] |
              (if .pull_request then "pull" else "issues" end) as $path |
              (if .pull_request then "PR" else "Issue" end) as $kind |
              "- [\($kind) #\(.number)](https://github.com/\($repo)/\($path)/\(.number))" +
              " opened \(.created_at[0:10]) - \(.title)"
            ' <<< "$items"
            echo
          }

          if [ "$DRY_RUN" = "true" ]; then
            title="Stale automation preview"
            note="Nothing was changed. This was a dry run."
            marked="would mark inactive"
            closed="would close"
          else
            title="Stale automation run"
            note="These changes were applied. Any comment or push clears the label and resets the clock."
            marked="marked inactive"
            closed="closed"
          fi

          {
            echo "## $title"
            echo
            echo "$note"
            echo
            echo "If an item should stay open, add an exempt label or adjust the"
            echo "thresholds in .github/workflows/stale.yml."
            echo
            render_items "$marked" "$SAFE_STALE"
            render_items "$closed" "$SAFE_CLOSE"
          } >> "$GITHUB_STEP_SUMMARY"
